name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  # ─── Job 1: Lint & Type Check ─────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Prettier check
        run: npm run format:check

      - name: TypeScript type check
        run: npm run type-check

  # ─── Job 2: Build ─────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    env:
      # Provide dummy env vars so Next.js can build without real secrets.
      DATABASE_URL: "postgresql://user:password@localhost:5432/portfolio_test"
      NEXT_PUBLIC_SENTRY_DSN: ""
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
      # Clerk keys — real keys via GitHub secrets, or a dummy test-mode placeholder
      # so ClerkProvider doesn't throw "Missing publishableKey" during the build.
      # Add NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY and CLERK_SECRET_KEY to your GitHub
      # repository's Actions secrets (Settings → Secrets and variables → Actions).
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY || 'pk_test_ZHVtbXkua2V5LmNsZXJrLmFjY291bnRzLmRldiQ' }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY || 'sk_test_dummy' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: .next/
          # .next/ is a hidden directory (dot-prefixed); upload-artifact@v4 excludes
          # hidden files by default, which causes the artifact to be empty and the
          # E2E download step to fail. This must be explicitly opted in.
          include-hidden-files: true
          retention-days: 1

  # ─── Job 3: Playwright E2E Tests ──────────────────────────────────────────
  e2e:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    needs: build
    env:
      DATABASE_URL: "postgresql://user:password@localhost:5432/portfolio_test"
      NEXT_PUBLIC_SENTRY_DSN: ""
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
      # Clerk keys — real keys preferred (set as GitHub secrets); dummy fallback
      # keeps the server alive for public-page smoke tests when secrets aren't set.
      # With dummy keys auth() always returns { userId: null } — correct for the
      # anonymous state our E2E tests exercise.
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY || 'pk_test_ZHVtbXkua2V5LmNsZXJrLmFjY291bnRzLmRldiQ' }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY || 'sk_test_dummy' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: nextjs-build
          path: .next/

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Run Playwright tests
        run: npm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
